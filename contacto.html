<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Contacto</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- 🧭 NAVBAR -->
  <nav class="navbar navbar-expand-lg bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="servicios.html">
        🎓 EduCatalog
      </a>

      <div>
        <a href="servicios.html" class="me-3 text-decoration-none">Services</a>
        <a href="favoritos.html" class="me-3 text-decoration-none">Favoritos</a>
        <a href="contacto.html" class="text-decoration-none">
          <i class="bi bi-envelope"></i> Contact
        </a>
      </div>
    </div>
  </nav>

  <!-- 🎯 HEADER -->
  <div class="hero p-5 mb-4">
    <div class="container">
      <h1 class="display-5 fw-bold">Contáctanos</h1>
      <p class="lead">Déjanos tu mensaje y te responderemos pronto</p>
    </div>
  </div>

  <!-- 📩 FORMULARIO -->
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card p-4 shadow-sm">

          <form onsubmit="return validarFormulario()">

            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" id="nombre" class="form-control" placeholder="Tu nombre">
            </div>

            <div class="mb-3">
              <label class="form-label">Correo</label>
              <input type="email" id="correo" class="form-control" placeholder="tucorreo@gmail.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Mensaje</label>
              <textarea id="mensaje" class="form-control" rows="4" placeholder="Escribe tu mensaje"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Enviar mensaje
            </button>

          </form>

        </div>

      </div>
    </div>
  </div>

  <!-- 🦶 FOOTER -->
  <footer class="bg-light mt-5 p-5">
    <div class="container">
      <h5>🎓 EduCatalog</h5>
      <p>Empowering learners worldwide with quality education.</p>

      <hr>

      <p>© 2026 EduCatalog. All rights reserved.</p>
    </div>
  </footer>

  <!-- JS -->
  <script src="js/app.js"></script>

</body>

</html>
